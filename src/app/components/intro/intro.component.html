<div class="intro-wrap">

  <!-- Doors -->
  <div class="door door-left"  [style.transform]="'translateX(-' + doorPercent + '%)'"></div>
  <div class="door door-right" [style.transform]="'translateX(' + doorPercent + '%)'"></div>

  <!-- Logo + Brand -->
  <div class="intro-logo"
       [style.opacity]="logoOpacity"
       [style.transform]="'scale(' + logoScale + ')'">
    <svg class="main-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="95" fill="#FFFFFF" stroke="#00D9FF" stroke-width="2"/>
      <path d="M100 30 L140 50 L140 90 Q140 120 100 140 Q60 120 60 90 L60 50 Z"
            fill="none" stroke="#00D9FF" stroke-width="3" stroke-linejoin="round"/>
      <!-- Network nodes -->
      <circle cx="100" cy="60" r="4" fill="#00FFA3"/>
      <circle cx="85" cy="80" r="4" fill="#00FFA3"/>
      <circle cx="115" cy="80" r="4" fill="#00FFA3"/>
      <circle cx="75" cy="100" r="4" fill="#00FFA3"/>
      <circle cx="100" cy="100" r="4" fill="#00FFA3"/>
      <circle cx="125" cy="100" r="4" fill="#00FFA3"/>
      <circle cx="90" cy="120" r="4" fill="#00FFA3"/>
      <circle cx="110" cy="120" r="4" fill="#00FFA3"/>
      <!-- Network lines -->
      <line x1="100" y1="60" x2="85" y2="80" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
      <line x1="100" y1="60" x2="115" y2="80" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
      <line x1="85" y1="80" x2="75" y2="100" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
      <line x1="85" y1="80" x2="100" y2="100" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
      <line x1="115" y1="80" x2="100" y2="100" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
      <line x1="115" y1="80" x2="125" y2="100" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
      <line x1="75" y1="100" x2="90" y2="120" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
      <line x1="100" y1="100" x2="90" y2="120" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
      <line x1="100" y1="100" x2="110" y2="120" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
      <line x1="125" y1="100" x2="110" y2="120" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
      <!-- Orbit rings -->
      <ellipse cx="100" cy="100" rx="70" ry="70" fill="none" stroke="#00D9FF"
               stroke-width="1" opacity="0.4" stroke-dasharray="5,5">
        <animateTransform attributeName="transform" type="rotate"
                          from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="100" cy="100" rx="80" ry="50" fill="none" stroke="#00FFA3"
               stroke-width="1" opacity="0.3" stroke-dasharray="3,3">
        <animateTransform attributeName="transform" type="rotate"
                          from="360 100 100" to="0 100 100" dur="15s" repeatCount="indefinite"/>
      </ellipse>
    </svg>

    <div class="brand">
      <span class="brand-name">CyberShield</span>
      <span class="brand-sub">Phishing Awareness</span>
    </div>
  </div>

  <!-- Scroll hint -->
  <div class="click-hint" [style.opacity]="hintOpacity">
    <span>Scroll om te openen</span>
    <div class="bounce-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
  </div>

</div>
