<section class="page-hero">
  <div class="hero-eyebrow">Trainingen</div>
  <h1>Tien trainingen,<br><em>één weerbare organisatie</em></h1>
  <p class="lead">Klik door alle tien trainingen en ontdek wat u leert over phishing, social engineering en digitale veiligheid.</p>
</section>

<div class="viewer">

  <!-- Progress bar -->
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-bar" [style.width.%]="progress"></div>
    </div>
    <span class="counter">{{ current + 1 }} / {{ trainingen.length }}</span>
  </div>

  <!-- Dot navigation -->
  <div class="dots">
    <button
      *ngFor="let t of trainingen; let i = index"
      class="dot"
      [class.active]="i === current"
      [title]="t.title"
      (click)="goTo(i)"
    ></button>
  </div>

  <!-- Slide -->
  <cs-training-slide [training]="training"></cs-training-slide>

  <!-- Navigation -->
  <div class="nav-row">
    <button class="btn-prev" [disabled]="isFirst" (click)="prev()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Vorige
    </button>

    <a routerLink="/contact" class="enroll-link">Aanmelden voor deze training</a>

    <button *ngIf="!isLast" class="btn-next" (click)="next()">
      Volgende
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <a *ngIf="isLast" routerLink="/contact" class="btn-next">
      Aanmelden
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </div>
</div>
